<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Presently Journal Book Maker</title>
    <meta name="description" content="Turn Presently CSV exports into a book-style PDF.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="backdrop backdrop-one"></div>
    <div class="backdrop backdrop-two"></div>

    <main class="shell">
        <section class="hero card">
            <div>
                <p class="eyebrow">Presently book maker</p>
                <h1>Turn journal entries into a book.</h1>
                <p class="lede">Upload your Presently CSV export or paste text, then create a book-style PDF with one
                    entry after another.</p>
            </div>
            <div class="hero-stats">
                <div class="stat">
                    <span id="entryCount">0</span>
                    <label>entries found</label>
                </div>
            </div>
        </section>

        <section class="workspace">
            <section class="card panel">
                <div class="panel-header">
                    <div>
                        <h2>Input</h2>
                        <p>Upload a CSV or paste the raw export text.</p>
                    </div>
                    <label class="file-button">
                        <input id="fileInput" type="file" accept=".csv,text/csv">
                        Choose file
                    </label>
                </div>

                <label class="field-label" for="bookTitle">Book title</label>
                <input id="bookTitle" class="text-input" type="text" value="My Presently Journal" maxlength="80">

                <textarea id="sourceInput" spellcheck="false" aria-label="CSV input"></textarea>

                <div class="actions">
                    <button id="buildPdfButton" type="button">Download book</button>
                </div>

                <p id="errorBanner" class="error-banner" hidden></p>
            </section>
        </section>

        <section class="card results">
            <div class="panel-header">
                <div>
                    <h2>Book preview</h2>
                    <p>Each card shows how the entry will appear in the PDF.</p>
                </div>
            </div>
            <div id="resultsList" class="results-list"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
